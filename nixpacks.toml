# Provide both Python (for the FastAPI backend) and Node (to build the Vite frontend).
[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "uvicorn api:app --host 0.0.0.0 --port ${PORT:-8080}"
