name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (import check)
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: "dummy-…ests"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check (api + calculator module)
        run: |
          python -c "import ast; ast.parse(open('api.py').read()); print('api.py parses')"
          python -c "import ast; ast.parse(open('airgead_banking.py').read()); print('airgead_banking.py parses')"

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
